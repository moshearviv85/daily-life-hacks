# Build + deploy to Cloudflare Pages via Wrangler (bypasses fragile Git integration UI).
# Required GitHub repo secret: CLOUDFLARE_API_TOKEN (Permissions: Cloudflare Pages — Edit)
#
# Daily run: rebuilds from origin/main. At build time, publishAt / isReleased() and sitemap
# filtering apply — scheduled articles become indexable without a new commit (content must
# already be on main).

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily ~06:15 UTC (morning IL / early US). Adjust if you want midnight in a specific TZ.
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=daily-life-hacks --branch=main
