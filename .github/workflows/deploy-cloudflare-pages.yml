# Build + deploy to Cloudflare Pages via Wrangler (bypasses fragile Git integration UI).
# Required GitHub repo secret: CLOUDFLARE_API_TOKEN (Permissions: Cloudflare Pages — Edit)
#
# Daily run: rebuilds from origin/main. At build time, publishAt / isReleased() and sitemap
# filtering apply — scheduled articles become indexable without a new commit (content must
# already be on main).

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main, staging]
  schedule:
    # Daily ~06:15 UTC (morning IL / early US). Adjust if you want midnight in a specific TZ.
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Branch-scoped so a staging push cannot cancel an in-flight production deploy (or vice versa).
  group: cloudflare-pages-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # IndexNow compares the complete push range after a verified main deploy.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read Pages project configuration
        id: pages_config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 91c501fca325c556efd161e4f904d443
        run: |
          PROJECT_JSON=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/daily-life-hacks")
          PRODUCTION_BRANCH=$(python -c "import json,sys; d=json.load(sys.stdin); assert d.get('success') is True, d; print(d['result']['production_branch'])" <<< "$PROJECT_JSON")
          test -n "$PRODUCTION_BRANCH"
          echo "production_branch=$PRODUCTION_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Cloudflare Pages production branch: $PRODUCTION_BRANCH"

      - name: Build and verify routing
        run: npm run build:checked

      - name: Build Pages Functions
        run: |
          rm -rf worker-out dist/_worker.js
          npx wrangler pages functions build functions --outdir=worker-out --output-routes-path=dist/_routes.json --project-directory=. --build-output-directory=dist
          cp worker-out/index.js dist/_worker.js
          cp public/_routes.json dist/_routes.json
          python -c "import json; routes=json.load(open('dist/_routes.json')); assert '/deploy-proof*' in routes['exclude'], routes"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 91c501fca325c556efd161e4f904d443
          command: pages deploy dist --project-name=daily-life-hacks --branch=${{ github.ref_name == 'main' && steps.pages_config.outputs.production_branch || github.ref_name }}

      - name: Verify production custom domain
        if: github.ref_name == 'main'
        run: |
          for i in $(seq 1 40); do
            LIVE_SHA=$(curl -fsS "https://www.daily-life-hacks.com/deploy-proof/?expected=${GITHUB_SHA}" \
              | python -c "import re,sys; match=re.search(r'data-commit=\"([^\"]+)\"', sys.stdin.read()); print(match.group(1) if match else '')" 2>/dev/null || true)
            echo "[$i] live=$LIVE_SHA expected=$GITHUB_SHA"
            if [ "$LIVE_SHA" = "$GITHUB_SHA" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Production custom domain did not reach commit $GITHUB_SHA"
          exit 1

      - name: Notify IndexNow about changed canonical pages
        if: github.ref_name == 'main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          python scripts/notify-indexnow.py \
            --base "${{ github.event.before }}" \
            --head "$GITHUB_SHA" \
            --sitemap-dir dist \
            --log-file indexnow-deploy-report.json

      - name: Upload IndexNow deploy report
        if: always() && github.ref_name == 'main' && github.event_name == 'push'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-deploy-${{ github.sha }}
          path: indexnow-deploy-report.json
          if-no-files-found: warn
          retention-days: 30
