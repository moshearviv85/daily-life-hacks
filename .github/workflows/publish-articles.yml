name: Daily Article Publisher

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC every day (production)
    - cron: '30 9 17 4 *'  # TEST: 09:30 UTC on 2026-04-17 only — article 1
    - cron: '40 9 17 4 *'  # TEST: 09:40 UTC on 2026-04-17 only — article 2
  workflow_dispatch:        # manual trigger from dashboard

env:
  PYTHONUNBUFFERED: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Publish due articles
        env:
          PINS_API_URL: https://www.daily-life-hacks.com
          PINS_API_KEY: ${{ secrets.STATS_KEY }}
          GH_PAT:       ${{ secrets.GH_PAT }}
        run: python scripts/publish-articles.py
