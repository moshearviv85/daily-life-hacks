name: Daily Article Publisher (Legacy)

# CP3.1: Schedule disabled. publishAt / sitemap release is handled by
# deploy-cloudflare-pages daily rebuild. Keep workflow_dispatch for draining
# leftover D1 articles_schedule rows only.

on:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Publish due articles (legacy articles_schedule)
        env:
          PINS_API_URL: https://www.daily-life-hacks.com
          PINS_API_KEY: ${{ secrets.STATS_KEY }}
          GH_PAT:       ${{ secrets.GH_PAT }}
        run: python scripts/publish-articles.py
