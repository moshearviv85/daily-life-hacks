name: Pipeline Article Assets

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Approved article slug to continue into images and pins'
        required: true
      mode:
        description: 'assets mode: full, hero_only, or support_only'
        required: false
        default: 'full'

permissions:
  contents: write
  actions: read

env:
  PYTHONUNBUFFERED: "1"
  PIPELINE_TARGET_BRANCH: "staging"
  PIPELINE_DASHBOARD_BASE_URL: "https://staging.daily-life-hacks.pages.dev"

jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare staging workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout -B pipeline-assets origin/staging
          git merge --no-edit origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests pyyaml google-generativeai httpx pillow

      - name: Verify article approval gate
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          curl -fsS "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-status?key=${DASHBOARD_PASSWORD}" > /tmp/pipeline-status.json
          python - <<'PY'
          import json
          import os
          import sys

          slug = "${{ inputs.slug }}"
          mode = "${{ inputs.mode }}"
          data = json.load(open("/tmp/pipeline-status.json", encoding="utf-8"))
          article = next((a for a in data.get("articles", []) if a.get("slug") == slug), None)
          if not article:
              print(f"ERROR: {slug} is not present in pipeline_articles. Produce it to staging first.", file=sys.stderr)
              sys.exit(1)

          stage = article.get("stage")
          allowed = {"deployed"} if mode not in {"hero_only", "support_only"} else {
              "deployed", "hero_brief", "pins_brief", "hero_image", "pin_images", "published"
          }
          if stage not in allowed:
              print(
                  f"ERROR: {slug} is not ready for asset generation. Current stage: {stage}.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Article approval gate passed for {slug}: stage={stage}, mode={mode}")
          PY

      - name: Continue approved article into assets
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          EXTRA_ARGS=""
          case "${{ inputs.mode }}" in
            hero_only)
              EXTRA_ARGS="--hero-only --force-images"
              ;;
            support_only)
              EXTRA_ARGS="--support-only --force-images"
              ;;
          esac
          python scripts/NEW_PIPELINE_2026-05-08/continue_article_assets.py \
            --slug "${{ inputs.slug }}" \
            $EXTRA_ARGS

      - name: Verify generated assets
        run: |
          VERIFY_ARGS=""
          case "${{ inputs.mode }}" in
            hero_only)
              VERIFY_ARGS="--hero-only"
              ;;
            support_only)
              VERIFY_ARGS="--support-only"
              ;;
          esac
          python scripts/NEW_PIPELINE_2026-05-08/verify_pipeline_artifacts.py \
            --slug "${{ inputs.slug }}" \
            $VERIFY_ARGS

      - name: Sync pin destinations registry
        if: ${{ inputs.mode == 'full' }}
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/sync_pin_destinations.py \
            --article-slug "${{ inputs.slug }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Build staging site
        run: npm run build:checked

      - name: Commit and push generated assets
        run: |
          git add src/data/articles/ public/images/ pipeline-data/ \
            public/data/pin-destinations-flat.json || true
          if git diff --cached --quiet; then
            echo "No generated assets to commit"
          else
            git commit -m "feat(pipeline): generate assets for ${{ inputs.slug }}

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:${PIPELINE_TARGET_BRANCH}
          fi

      - name: Wait for staging Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Waiting for deploy-cloudflare-pages.yml on staging..."
          for i in $(seq 1 40); do
            ROW=$(gh run list --workflow=deploy-cloudflare-pages.yml --branch=staging --limit=1 \
              --json status,conclusion \
              --jq '.[0] | "\(.status)|\(.conclusion // "null")"')
            echo "[$i] $ROW"
            STATUS=$(echo "$ROW" | cut -d'|' -f1)
            CONCLUSION=$(echo "$ROW" | cut -d'|' -f2)
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              exit 0
            fi
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for staging deploy"
          exit 1

      - name: Sync pipeline status to D1
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/NEW_PIPELINE_2026-05-08/sync_pipeline_to_d1.py --base-url "$PIPELINE_DASHBOARD_BASE_URL" --key "$DASHBOARD_PASSWORD"
