name: Pinterest Boards

on:
  workflow_dispatch:
    inputs:
      create:
        description: 'Create missing target boards'
        type: boolean
        default: false

jobs:
  boards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create or list boards
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CREATE_BOARDS: ${{ github.event.inputs.create }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/pinterest_boards.py
