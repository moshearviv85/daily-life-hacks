name: Pipeline Daily

on:
  # Manual only while the AI pipeline is being stabilized.
  # This workflow can generate articles/images; generated files go to staging first.
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  PIPELINE_TARGET_BRANCH: "staging"

jobs:
  daily-produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml google-generativeai httpx

      - name: Create pipeline-data directory
        run: mkdir -p pipeline-data

      - name: Fetch approved topics from D1
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          curl -s "https://www.daily-life-hacks.com/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&status=approved" \
            | python -c "
          import json, sys
          data = json.load(sys.stdin)
          topics = data.get('topics', [])
          selected = topics[:2]
          if not selected:
              print('No approved topics found — skipping staging production', file=sys.stderr)
              sys.exit(0)
          print(f'Selected {len(selected)} topics for daily staging production:', file=sys.stderr)
          for t in selected:
              print(f'  - [{t[\"category\"]}] {t[\"topic\"]}', file=sys.stderr)
          with open('pipeline-data/selected-topics.json', 'w') as f:
              json.dump(selected, f, indent=2)
          print(json.dumps([t['id'] for t in selected]))
          " > /tmp/topic-ids.json

      - name: Check if topics were selected
        id: check-topics
        run: |
          if [ -f pipeline-data/selected-topics.json ]; then
            echo "has_topics=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_topics=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Produce articles
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          cat pipeline-data/selected-topics.json | python -c "
          import json, sys, subprocess
          topics = json.load(sys.stdin)
          for t in topics:
              print(f'=== Producing: {t[\"topic\"]} ({t[\"category\"]}) ===')
              result = subprocess.run([
                  sys.executable,
                  'scripts/NEW_PIPELINE_2026-05-08/run_pipeline.py',
                  t['topic'],
                  '--category', t['category']
              ], capture_output=False)
              if result.returncode != 0:
                  print(f'WARNING: Pipeline failed for {t[\"topic\"]}')
          "

      - name: Mark topics as produced
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          IDS=$(cat /tmp/topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            curl -s -X POST \
              "https://www.daily-life-hacks.com/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=produced" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS}"
          fi

      - name: Sync pipeline status to D1
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          STATS_KEY: ${{ secrets.STATS_KEY }}
        run: python scripts/NEW_PIPELINE_2026-05-08/sync_pipeline_to_d1.py --key "$STATS_KEY"

      - name: Commit and push generated files
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles/ public/images/ pipeline-data/ || true
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "feat(pipeline): daily article production

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
            git push https://x-access-token:${GH_PAT}@github.com/moshearviv85/daily-life-hacks.git HEAD:${PIPELINE_TARGET_BRANCH}
          fi
