name: Pipeline Daily

on:
  # Manual only while the AI pipeline is being stabilized.
  # This workflow can generate articles/images; generated files go to staging first.
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  PIPELINE_TARGET_BRANCH: "staging"
  PIPELINE_DASHBOARD_BASE_URL: "https://staging.daily-life-hacks.pages.dev"

jobs:
  daily-produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare staging workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout -B pipeline-staging origin/staging
          git merge --no-edit origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml google-generativeai httpx pillow

      - name: Create pipeline-data directory
        run: mkdir -p pipeline-data

      - name: Fetch approved topics from D1
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          curl -s "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&status=approved" > /tmp/approved-topics.json
          python scripts/NEW_PIPELINE_2026-05-08/select_pipeline_topics.py \
            --input /tmp/approved-topics.json \
            --count 2 \
            --selected-output pipeline-data/selected-topics.json \
            --rejected-output /tmp/quality-rejected-topics.json \
            > /tmp/topic-ids.json

      - name: Reject low-quality approved topics
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python - <<'PY' > /tmp/quality-rejected-topic-ids.json
          import json
          rows = json.load(open('/tmp/quality-rejected-topics.json'))
          print(json.dumps([int(r['id']) for r in rows if r.get('id')]))
          PY
          IDS=$(cat /tmp/quality-rejected-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            curl -s -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=reject" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS, \"reason\": \"rejected by deterministic topic quality gate before production\"}"
          fi

      - name: Check if topics were selected
        id: check-topics
        run: |
          COUNT=$(python - <<'PY'
          import json
          try:
              print(len(json.load(open('pipeline-data/selected-topics.json'))))
          except Exception:
              print(0)
          PY
          )
          if [ "$COUNT" -gt 0 ]; then
            echo "has_topics=true" >> "$GITHUB_OUTPUT"
          else
            echo "No production-safe approved topics found after deterministic quality gate."
            echo "has_topics=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Produce articles
        id: produce
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          cat pipeline-data/selected-topics.json | python -c "
          import json, sys, subprocess
          topics = json.load(sys.stdin)
          failed = []
          produced = []
          for t in topics:
              print(f'=== Producing: {t[\"topic\"]} ({t[\"category\"]}) ===')
              result = subprocess.run([
                  sys.executable,
                  'scripts/NEW_PIPELINE_2026-05-08/run_pipeline.py',
                  t['topic'],
                  '--category', t['category']
              ], capture_output=False)
              if result.returncode != 0:
                  print(f'ERROR: Pipeline failed for {t[\"topic\"]}', file=sys.stderr)
                  failed.append(t)
              else:
                  produced.append(t)
          with open('pipeline-data/produced-topics.json', 'w') as f:
              json.dump(produced, f, indent=2)
          with open('pipeline-data/failed-topics.json', 'w') as f:
              json.dump(failed, f, indent=2)
          with open('/tmp/produced-topic-ids.json', 'w') as f:
              json.dump([t['id'] for t in produced], f)
          with open('/tmp/failed-topic-ids.json', 'w') as f:
              json.dump([t['id'] for t in failed], f)
          if failed:
              print('Failed topics:', file=sys.stderr)
              for t in failed:
                  print(f'  - {t[\"topic\"]}', file=sys.stderr)
          if not produced:
              print('No topics produced successfully.', file=sys.stderr)
          print(f'Produced {len(produced)} topic(s); failed {len(failed)} topic(s).')
          "
          IDS=$(cat /tmp/produced-topic-ids.json)
          if [ "$IDS" = "[]" ]; then
            echo "has_produced=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_produced=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify generated staging artifacts
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/verify_pipeline_artifacts.py \
            --selected-topics pipeline-data/produced-topics.json

      - name: Commit and push generated files
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles/ public/images/ pipeline-data/ || true
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "feat(pipeline): daily article production

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:${PIPELINE_TARGET_BRANCH}
          fi

      - uses: actions/setup-node@v4
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install site dependencies
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        run: npm ci

      - name: Build staging site
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        run: npm run build

      - name: Build Pages Functions
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        run: |
          rm -rf worker-out dist/_worker.js
          npx wrangler pages functions build functions --outdir=worker-out --output-routes-path=dist/_routes.json --project-directory=. --build-output-directory=dist
          cp worker-out/index.js dist/_worker.js

      - name: Deploy staging to Cloudflare Pages
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=daily-life-hacks --branch=staging

      - name: Mark topics as produced
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'true'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          IDS=$(cat /tmp/produced-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            curl -s -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=produced" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS}"
          fi

      - name: Mark failed topics as rejected
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          IDS=$(cat /tmp/failed-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            curl -s -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=reject" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS, \"reason\": \"article generation failed automated quality checks\"}"
          fi

      - name: Sync pipeline status to D1
        if: steps.check-topics.outputs.has_topics == 'true'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/NEW_PIPELINE_2026-05-08/sync_pipeline_to_d1.py --base-url "$PIPELINE_DASHBOARD_BASE_URL" --key "$DASHBOARD_PASSWORD"

      - name: Fail if no articles were produced
        if: steps.check-topics.outputs.has_topics == 'true' && steps.produce.outputs.has_produced == 'false'
        run: |
          echo "No articles passed quality checks. Failed topics were rejected and D1 was synced."
          exit 1
