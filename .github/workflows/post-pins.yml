name: Pinterest Auto-Poster

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min — catches ±30 min time jitter
  workflow_dispatch:
    inputs:
      immediate:
        description: 'Skip schedule filter — publish first PENDING pin now'
        type: boolean
        default: false

jobs:
  post-pin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto-poster
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINS_API_URL: https://www.daily-life-hacks.com
          PINS_API_KEY: ${{ secrets.STATS_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMMEDIATE: ${{ github.event.inputs.immediate }}
          MAX_PINS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.immediate == 'true' && '1' || '2' }}
        run: python scripts/post-pins.py
