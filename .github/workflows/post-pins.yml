name: Pinterest Auto-Poster

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min — catches ±30 min time jitter
  workflow_dispatch:
    inputs:
      immediate:
        description: 'Skip schedule filter, but keep server cooldown safety'
        type: boolean
        default: false
      row_id:
        description: 'Optional pins_schedule row_id for immediate mode, still rate-limited'
        required: false
        default: ''

jobs:
  post-pin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run auto-poster
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINS_API_URL: https://www.daily-life-hacks.com
          PINS_API_KEY: ${{ secrets.STATS_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMMEDIATE: ${{ github.event.inputs.immediate }}
          PIN_ROW_ID: ${{ github.event.inputs.row_id }}
          MAX_PINS_PER_RUN: 1
        run: python scripts/post-pins.py
