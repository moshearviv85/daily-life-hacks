name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to merge reviewed staging into main'
        required: true
        default: ''

permissions:
  contents: write
  # actions: write — bot pushes with GITHUB_TOKEN never fire on:push workflows,
  # so the deploy must be dispatched explicitly (workflow_dispatch is exempt).
  actions: write

concurrency:
  group: promote-staging-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require explicit confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PROMOTE" ]; then
            echo "Promotion cancelled: confirmation must be PROMOTE."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify staging before promotion
        run: |
          git fetch origin main staging
          git checkout --detach origin/staging
          npm ci
          npm run build:checked

      - name: Merge staging into main
        id: merge_staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          git merge --no-edit origin/staging
          AFTER=$(git rev-parse HEAD)
          git push origin main
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN pushes do not trigger on:push workflows (GitHub anti-recursion
      # rule), so dispatch the deploy explicitly and watch that exact run.
      - name: Trigger and wait for production Cloudflare deploy
        if: steps.merge_staging.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          SINCE=$(date -u -d '30 seconds ago' +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run deploy-cloudflare-pages.yml --ref main
          RUN_ID=""
          for i in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list --workflow=deploy-cloudflare-pages.yml \
              --branch=main --event=workflow_dispatch --limit=5 \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$SINCE\")][0].databaseId // empty")
            [ -n "$RUN_ID" ] && break
          done
          if [ -z "$RUN_ID" ]; then
            echo "Dispatched deploy run never appeared"
            exit 1
          fi
          echo "Watching deploy run $RUN_ID"
          gh run watch "$RUN_ID" --exit-status

      - name: Sync production pipeline metadata
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/sync_staging_pipeline_to_production.py \
            --key "$DASHBOARD_PASSWORD"

      - name: Verify production live metadata
        run: node scripts/verify-live-rich-pin-metadata.mjs https://www.daily-life-hacks.com/best-way-to-cook-baked-potatoes/
