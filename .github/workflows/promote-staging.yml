name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to merge reviewed staging into main'
        required: true
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: promote-staging-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require explicit confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PROMOTE" ]; then
            echo "Promotion cancelled: confirmation must be PROMOTE."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify staging before promotion
        run: |
          git fetch origin main staging
          git checkout --detach origin/staging
          npm ci
          npm run build:checked

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-edit origin/staging
          git push origin main

      # CP3.1: do not wrangler-deploy here — push to main triggers deploy-cloudflare-pages.yml
      - name: Wait for production Cloudflare deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Waiting for deploy-cloudflare-pages.yml on main..."
          for i in $(seq 1 40); do
            ROW=$(gh run list --workflow=deploy-cloudflare-pages.yml --branch=main --limit=1 \
              --json databaseId,status,conclusion,createdAt,displayTitle \
              --jq '.[0] | "\(.databaseId)|\(.status)|\(.conclusion // "null")|\(.createdAt)"')
            echo "[$i] $ROW"
            STATUS=$(echo "$ROW" | cut -d'|' -f2)
            CONCLUSION=$(echo "$ROW" | cut -d'|' -f3)
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              echo "Deploy succeeded."
              exit 0
            fi
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
              echo "Deploy finished with conclusion=$CONCLUSION"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for production deploy"
          exit 1

      - name: Sync production pipeline metadata
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/sync_staging_pipeline_to_production.py \
            --key "$DASHBOARD_PASSWORD"

      - name: Verify production live metadata
        run: node scripts/verify-live-rich-pin-metadata.mjs https://www.daily-life-hacks.com/best-way-to-cook-baked-potatoes/
