name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to fast-forward main to staging'
        required: true
        default: ''

permissions:
  contents: write

concurrency:
  group: promote-staging-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Require explicit confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PROMOTE" ]; then
            echo "Promotion cancelled: confirmation must be PROMOTE."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify staging before promotion
        run: |
          git fetch origin main staging
          git checkout --detach origin/staging
          npm ci
          npm run build:checked

      - name: Fast-forward main to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --ff-only origin/staging
          git push origin main
