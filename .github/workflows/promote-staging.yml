name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to merge reviewed staging into main'
        required: true
        default: ''

permissions:
  contents: write

concurrency:
  group: promote-staging-to-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Require explicit confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PROMOTE" ]; then
            echo "Promotion cancelled: confirmation must be PROMOTE."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify staging before promotion
        run: |
          git fetch origin main staging
          git checkout --detach origin/staging
          npm ci
          npm run build:checked

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-edit origin/staging
          git push origin main

      - name: Build production artifact
        run: npm run build

      - name: Build Pages Functions
        run: |
          rm -rf worker-out dist/_worker.js
          npx wrangler pages functions build functions --outdir=worker-out --output-routes-path=dist/_routes.json --project-directory=. --build-output-directory=dist
          cp worker-out/index.js dist/_worker.js

      - name: Publish production to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=daily-life-hacks --branch=main

      - name: Verify production live metadata
        run: node scripts/verify-live-rich-pin-metadata.mjs https://www.daily-life-hacks.com/best-way-to-cook-baked-potatoes/
