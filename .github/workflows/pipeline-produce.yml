name: Pipeline Produce

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to produce'
        required: false
        default: '1'
      category:
        description: 'Category filter (empty = any)'
        required: false
        default: ''
      topic_ids:
        description: 'Comma-separated pipeline_topics ids to produce (empty = first approved topics)'
        required: false
        default: ''

concurrency:
  group: pipeline-produce-staging
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  PYTHONUNBUFFERED: "1"
  PIPELINE_TARGET_BRANCH: "staging"
  PIPELINE_DASHBOARD_BASE_URL: "https://staging.daily-life-hacks.pages.dev"
  ARTICLE_WRITER_MODEL: ${{ vars.ARTICLE_WRITER_MODEL || 'minimax/minimax-m2.5' }}

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare staging workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout -B pipeline-staging origin/staging
          git merge --no-edit origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml google-generativeai httpx pillow

      - name: Create pipeline-data directory
        run: mkdir -p pipeline-data

      - name: Fetch approved topics from D1
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          TOPIC_IDS="${{ inputs.topic_ids }}"
          STATUS_FILTER="&status=approved"
          if [ -n "$TOPIC_IDS" ]; then
            STATUS_FILTER=""
          fi
          curl -s "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}${STATUS_FILTER}" > /tmp/approved-topics.json
          python scripts/NEW_PIPELINE_2026-05-08/select_pipeline_topics.py \
            --input /tmp/approved-topics.json \
            --count "${{ inputs.count }}" \
            --category "${{ inputs.category }}" \
            --topic-ids "${{ inputs.topic_ids }}" \
            --selected-output pipeline-data/selected-topics.json \
            --rejected-output /tmp/quality-rejected-topics.json \
            > /tmp/topic-ids.json

      - name: Reject low-quality approved topics
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python - <<'PY' > /tmp/quality-rejected-topic-ids.json
          import json
          rows = json.load(open('/tmp/quality-rejected-topics.json'))
          print(json.dumps([int(r['id']) for r in rows if r.get('id')]))
          PY
          IDS=$(cat /tmp/quality-rejected-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            RESP=$(curl -fsS -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=reject" \
              -H "x-api-key: ${DASHBOARD_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS, \"reason\": \"rejected by deterministic topic quality gate before production\"}")
            python -c "import json,sys; d=json.load(sys.stdin); assert d.get('ok') is True, d" <<< "$RESP"
          fi

      - name: Mark selected topics as queued
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python - <<'PY' > /tmp/selected-topic-ids.json
          import json
          rows = json.load(open('pipeline-data/selected-topics.json'))
          print(json.dumps([int(r['id']) for r in rows if r.get('id')]))
          PY
          IDS=$(cat /tmp/selected-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            RESP=$(curl -fsS -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=queue" \
              -H "x-api-key: ${DASHBOARD_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS, \"reason\": \"pipeline produce workflow is running\"}")
            python -c "import json,sys; d=json.load(sys.stdin); assert d.get('ok') is True, d" <<< "$RESP"
          fi

      - name: Produce articles
        id: produce
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          TOPICS=$(cat pipeline-data/selected-topics.json)
          COUNT=$(echo "$TOPICS" | python -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "Producing $COUNT articles..."
          echo "$TOPICS" | python -c "
          import json, os, sys, subprocess
          topics = json.load(sys.stdin)
          failed = []
          produced = []
          for t in topics:
              print(f'=== Producing: {t[\"topic\"]} ({t[\"category\"]}) ===')
              result = subprocess.run([
                  sys.executable,
                  'scripts/NEW_PIPELINE_2026-05-08/run_pipeline.py',
                  t['topic'],
                  '--category', t['category'],
                  '--model', os.environ.get('ARTICLE_WRITER_MODEL', 'minimax/minimax-m2.5')
              ], capture_output=False)
              if result.returncode != 0:
                  print(f'ERROR: Pipeline failed for {t[\"topic\"]}', file=sys.stderr)
                  failed.append(t)
              else:
                  produced.append(t)
          with open('pipeline-data/produced-topics.json', 'w') as f:
              json.dump(produced, f, indent=2)
          with open('pipeline-data/failed-topics.json', 'w') as f:
              json.dump(failed, f, indent=2)
          with open('/tmp/produced-topic-ids.json', 'w') as f:
              json.dump([t['id'] for t in produced], f)
          with open('/tmp/failed-topic-ids.json', 'w') as f:
              json.dump([t['id'] for t in failed], f)
          if failed:
              print('Failed topics:', file=sys.stderr)
              for t in failed:
                  print(f'  - {t[\"topic\"]}', file=sys.stderr)
          if not produced:
              print('No topics produced successfully.', file=sys.stderr)
          print(f'Produced {len(produced)} topic(s); failed {len(failed)} topic(s).')
          "
          IDS=$(cat /tmp/produced-topic-ids.json)
          if [ "$IDS" = "[]" ]; then
            echo "has_produced=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_produced=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify generated staging artifacts
        if: steps.produce.outputs.has_produced == 'true'
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/verify_pipeline_artifacts.py \
            --selected-topics pipeline-data/produced-topics.json \
            --report "pipeline-data/reports/pipeline-produce-${{ github.run_id }}.json"

      - name: Sync pin destinations registry
        if: steps.produce.outputs.has_produced == 'true'
        run: |
          python scripts/NEW_PIPELINE_2026-05-08/sync_pin_destinations.py --only-complete
          git add pipeline-data/pin-destinations.json \
            pipeline-data/slug-aliases.json \
            pipeline-data/router-mapping.json \
            public/data/pin-destinations-flat.json || true

      - uses: actions/setup-node@v4
        if: steps.produce.outputs.has_produced == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install site dependencies
        if: steps.produce.outputs.has_produced == 'true'
        run: npm ci

      - name: Build staging site
        if: steps.produce.outputs.has_produced == 'true'
        run: npm run build:checked

      - name: Commit and push generated files
        if: steps.produce.outputs.has_produced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles/ public/images/ \
            pipeline-data/selected-topics.json \
            pipeline-data/produced-topics.json \
            pipeline-data/failed-topics.json \
            pipeline-data/reports/ \
            pipeline-data/pin-destinations.json \
            pipeline-data/slug-aliases.json \
            pipeline-data/router-mapping.json \
            public/data/pin-destinations-flat.json || true
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "feat(pipeline): produce full staging artifacts via GH Actions

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:${PIPELINE_TARGET_BRANCH}
          fi

      # CP3.1: push to staging triggers deploy-cloudflare-pages.yml (no duplicate wrangler)
      - name: Wait for staging Pages deploy
        if: steps.produce.outputs.has_produced == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Waiting for deploy-cloudflare-pages.yml on staging..."
          for i in $(seq 1 40); do
            ROW=$(gh run list --workflow=deploy-cloudflare-pages.yml --branch=staging --limit=1 \
              --json status,conclusion \
              --jq '.[0] | "\(.status)|\(.conclusion // "null")"')
            echo "[$i] $ROW"
            STATUS=$(echo "$ROW" | cut -d'|' -f1)
            CONCLUSION=$(echo "$ROW" | cut -d'|' -f2)
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
              exit 0
            fi
            if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" != "success" ]; then
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for staging deploy"
          exit 1

      - name: Mark topics as produced
        if: steps.produce.outputs.has_produced == 'true'
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          IDS=$(cat /tmp/produced-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            RESP=$(curl -fsS -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=produced" \
              -H "x-api-key: ${DASHBOARD_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS}")
            python -c "import json,sys; d=json.load(sys.stdin); assert d.get('ok') is True, d" <<< "$RESP"
          fi

      - name: Return failed topics to approved
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          IDS=$(cat /tmp/failed-topic-ids.json)
          if [ "$IDS" != "[]" ]; then
            echo "Failed topic ids return to approved for retry: $IDS"
            RESP=$(curl -fsS -X POST \
              "${PIPELINE_DASHBOARD_BASE_URL}/api/pipeline-topics?key=${DASHBOARD_PASSWORD}&action=approve" \
              -H "x-api-key: ${DASHBOARD_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"ids\": $IDS, \"reason\": \"pipeline production failed; returned to approved for retry\"}")
            python -c "import json,sys; d=json.load(sys.stdin); assert d.get('ok') is True, d" <<< "$RESP"
          fi

      - name: Sync pipeline status to D1
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/NEW_PIPELINE_2026-05-08/sync_pipeline_to_d1.py --base-url "$PIPELINE_DASHBOARD_BASE_URL" --key "$DASHBOARD_PASSWORD"

      - name: Fail if no articles were produced
        if: steps.produce.outputs.has_produced == 'false'
        run: |
          echo "No articles were produced. Failed topics were returned to approved for retry and D1 was synced."
          exit 1
